<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人主页 | Tech Profile</title>
    <meta
      name="description"
      content="一个现代化深色科技风个人主页，包含头像、简介、联系方式和社交媒体入口。"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <main class="page-shell">
      <section class="profile-panel" aria-label="个人主页">
        <div class="avatar-wrap">
          <div class="avatar-ring" aria-hidden="true"></div>
          <img
            class="avatar"
            src="assets/avatar.svg"
            alt="个人头像"
            width="180"
            height="180"
          />
        </div>

        <div class="intro">
          <p class="eyebrow">Digital Creator / Frontend Explorer</p>
          <h1>你好，我是 李博文</h1>
          <p class="bio">
            专注于构建现代化 Web 体验，喜欢把清晰的信息架构、顺滑的交互和具有科技感的视觉设计结合起来。
            目前关注前端工程、AI 产品体验与个人品牌建设。
          </p>
        </div>

        <div class="stats" aria-label="个人亮点">
          <div>
            <strong>6+</strong>
            <span>Years</span>
          </div>
          <div>
            <strong>28</strong>
            <span>Projects</span>
          </div>
          <div>
            <strong>24/7</strong>
            <span>Online</span>
          </div>
        </div>

        <section class="contact-card" aria-label="联系方式">
          <h2>联系方式</h2>
          <ul class="contact-list">
            <li>
              <span class="contact-icon">@</span>
              <a href="157855799@qq.com">157855799@qq.com</a>
            </li>
            <li>
              <span class="contact-icon">#</span>
              <a href="tel:+8613903227162">+86 139 0322 7162</a>
            </li>
            <li>
              <span class="contact-icon">⌖</span>
              <span>石家庄, China</span>
            </li>
          </ul>
        </section>

        <nav class="socials" aria-label="社交媒体">
          <a href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a>
          <a href="https://www.linkedin.com/" target="_blank" rel="noreferrer">LinkedIn</a>
          <a href="https://x.com/" target="_blank" rel="noreferrer">X</a>
          <a href="https://dribbble.com/" target="_blank" rel="noreferrer">Dribbble</a>
        </nav>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
